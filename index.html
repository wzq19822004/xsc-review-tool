<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小升初分班考 · 12天系统复习工具</title>
<style>
:root {
  --bg: #0f172a; --bg2: #1e293b; --bg3: #334155; --bg4: #475569;
  --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
  --accent: #38bdf8; --green: #22c55e; --red: #ef4444; --orange: #f59e0b;
  --chinese: #f59e0b; --math: #3b82f6; --english: #22c55e;
  --sidebar-w: 240px;
  --font: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-mono: "SF Mono", "JetBrains Mono", "Cascadia Code", monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: var(--font); background: var(--bg); color: var(--text);
  line-height: 1.85; display: flex; min-height: 100vh;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}
body { overscroll-behavior: contain; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
button, [role="button"], a, .clickable { cursor: pointer; transition: all .15s ease; }
button:active { transform: scale(.97); }
/* ═══ Sidebar ═══ */
aside {
  width: var(--sidebar-w); background: var(--bg2); padding: 20px 0;
  display: flex; flex-direction: column; position: fixed;
  top: 0; left: 0; bottom: 0; z-index: 100; overflow-y: auto;
  border-right: 1px solid var(--bg3);
}
aside .logo {
  font-size: 20px; font-weight: 700; text-align: center;
  padding: 0 16px 24px; border-bottom: 1px solid var(--bg3); margin-bottom: 12px;
}
aside .logo span { color: var(--accent); }
aside nav { flex: 1; }
aside nav a {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 20px; color: var(--text2); text-decoration: none;
  font-size: 14px; transition: all .15s; border-left: 3px solid transparent;
  cursor: pointer;
}
aside nav a:hover { color: var(--text); background: rgba(255,255,255,.04); }
aside nav a.active {
  color: var(--text); background: rgba(56,189,248,.08);
  border-left-color: var(--accent);
}
aside .sb-progress { padding: 16px 20px; border-top: 1px solid var(--bg3); margin-top: auto; }
aside .sb-label { font-size: 11px; color: var(--text3); }
aside .sb-bar { height: 5px; background: var(--bg3); border-radius: 3px; margin: 6px 0; overflow: hidden; }
aside .sb-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width .4s; }
/* ═══ Main ═══ */
main {
  margin-left: var(--sidebar-w); flex: 1; padding: 28px 36px; max-width: 1100px;
}
.page { display: none; }
.page.active { display: block; }
/* ═══ Top Bar ═══ */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 22px; flex-wrap: wrap; gap: 12px;
}
.top-bar h1 { font-size: 24px; font-weight: 700; }
.top-bar .meta { font-size: 14px; color: var(--text2); }
/* ═══ Buttons ═══ */
.btn {
  padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer;
  font-size: 14px; font-weight: 600; transition: all .15s; font-family: var(--font);
}
.btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }
.btn-print { background: var(--bg3); color: var(--text); }
.btn-print:hover { background: var(--accent); color: #0f172a; }
.btn-primary { background: var(--accent); color: #0f172a; }
.btn-primary:hover { opacity: .85; }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { opacity: .85; }
/* ═══ Day Navigation ═══ */
.day-nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 22px; }
.day-nav button {
  width: 44px; height: 44px; border-radius: 8px;
  border: 1px solid var(--bg3); background: var(--bg2); color: var(--text2);
  cursor: pointer; font-size: 14px; font-weight: 600; transition: all .15s;
  position: relative;
}
.day-nav button:hover { border-color: var(--accent); color: var(--text); }
.day-nav button.active { background: var(--accent); color: #0f172a; border-color: var(--accent); }
.day-nav button.done { border-color: var(--green); }
.day-nav button.done::after {
  content: '✓'; position: absolute; top: -6px; right: -6px;
  font-size: 11px; color: #fff; background: var(--green); border-radius: 50%;
  width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
}
/* ═══ Cards ═══ */
.card {
  background: var(--bg2); border-radius: 12px; padding: 22px 26px;
  margin-bottom: 18px; border: 1px solid var(--bg3);
}
.card h3 { font-size: 18px; margin-bottom: 14px; }
.card p, .card li { font-size: 15px; line-height: 2.0; margin-bottom: 8px; }
/* ═══ Section Cards ═══ */
.section-card {
  background: var(--bg2); border-radius: 12px; margin-bottom: 16px;
  border: 1px solid var(--bg3); overflow: hidden;
}
.section-card .sec-hdr {
  padding: 16px 22px; cursor: pointer; display: flex; align-items: center;
  justify-content: space-between; user-select: none; background: rgba(255,255,255,.01);
  min-height: 44px; transition: background .15s;
}
.section-card .sec-hdr:hover { background: rgba(56,189,248,.04); }
.section-card.open .sec-hdr { border-bottom: 1px solid var(--bg3); }
.section-card .sec-hdr .s-left { display: flex; align-items: center; gap: 12px; }
.section-card .sec-hdr .s-tag { font-size: 12px; padding: 4px 10px; border-radius: 5px; font-weight: 700; }
.section-card .sec-hdr .s-topic { font-size: 17px; font-weight: 700; }
.section-card .sec-hdr .s-arrow { font-size: 12px; color: var(--text2); transition: transform .2s; }
.section-card.open .sec-hdr .s-arrow { transform: rotate(180deg); }
.section-card .sec-body { display: none; padding: 22px; }
.section-card.open .sec-body { display: block; }
/* ═══ Content Blocks ═══ */
.teach-block {
  background: var(--bg3); padding: 18px 22px; border-radius: 10px;
  margin-bottom: 16px; font-size: 15px; line-height: 2.1;
}
.teach-block b, .teach-block strong { color: #fbbf24; }
.formula-block {
  background: linear-gradient(135deg, rgba(59,130,246,.06), rgba(56,189,248,.04));
  border-left: 4px solid var(--math);
  border-right: 1px solid rgba(59,130,246,.15);
  padding: 20px 24px; border-radius: 0 12px 12px 0; margin: 16px 0;
  font-family: var(--font-mono); font-size: 18px; line-height: 2.8;
  letter-spacing: 1px; color: #e2e8f0;
  overflow-x: auto; white-space: pre-wrap;
}
.formula-block .var { color: #fbbf24; font-style: italic; }
.formula-block .num { color: #38bdf8; }
.formula-block .op { color: #f472b6; }
.frac { display: inline-block; text-align: center; vertical-align: middle; margin: 0 3px; }
.frac > span { display: block; padding: 0 4px; line-height: 1.2; }
.frac > span:first-child { border-bottom: 2px solid var(--math); }
.formula-block .frac { margin: 0 4px; }
.formula-block .frac > span { padding: 0 6px; }
.formula-block .frac > span:first-child { border-bottom: 2px solid var(--math); }
.formula-block .eq-highlight { color: #22c55e; font-weight: 700; }
.formula-block .formula-title { display: block; font-size: 13px; color: var(--text3); font-family: var(--font); margin-bottom: 8px; letter-spacing: 0; }
/* ═══ Knowledge Map ═══ */
.kmap { background: var(--bg2); border-radius: 12px; padding: 22px 26px; margin-bottom: 18px; border: 1px solid var(--bg3); }
.kmap h3 { font-size: 18px; margin-bottom: 16px; }
.kmap-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: flex-start; }
.kmap-label { font-size: 13px; color: var(--text3); min-width: 80px; padding-top: 4px; font-weight: 700; }
.kmap-items { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
.kmap-chip { font-size: 12px; padding: 5px 12px; border-radius: 14px; background: var(--bg3); white-space: nowrap; cursor: pointer; transition: all .15s; }
.kmap-chip:hover { background: var(--bg4); }
.kmap-chip.learned { background: rgba(34,197,94,.15); color: var(--green); }
.kmap-chip.current { background: rgba(56,189,248,.15); color: var(--accent); border: 1px solid rgba(56,189,248,.3); }
.kmap-chip.pending { background: var(--bg3); color: var(--text3); }
/* ═══ Quick stats ═══ */
.quick-stats { display: flex; gap: 12px; margin-bottom: 18px; }
.quick-stat { flex: 1; background: var(--bg2); border-radius: 10px; padding: 16px; text-align: center; border: 1px solid var(--bg3); }
.quick-stat .qs-val { font-size: 28px; font-weight: 800; }
.quick-stat .qs-label { font-size: 12px; color: var(--text2); margin-top: 4px; }
/* ═══ Daily report mini ═══ */
.rpt-mini { background: var(--bg2); border-radius: 12px; padding: 18px 22px; margin-bottom: 18px; border: 1px solid var(--bg3); }
.rpt-mini h3 { font-size: 16px; margin-bottom: 12px; }
.rpt-mini-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.04); font-size: 14px; }
.rpt-mini-item:last-child { border-bottom: none; }
.poem-card {
  background: linear-gradient(135deg, rgba(245,158,11,.06), rgba(168,85,247,.06));
  border: 1px solid rgba(245,158,11,.15); border-radius: 12px; padding: 26px; margin: 16px 0;
}
.poem-card .poem-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 6px; color: var(--chinese); }
.poem-card .poem-author { text-align: center; font-size: 14px; color: var(--text2); margin-bottom: 18px; }
.poem-card .poem-text { text-align: center; font-size: 19px; line-height: 2.4; letter-spacing: 2px; margin-bottom: 18px; font-weight: 500; }
.poem-card .poem-notes { font-size: 14px; color: var(--text2); line-height: 1.9; border-top: 1px dashed var(--bg4); padding-top: 14px; }
.reading-passage {
  background: var(--bg); border-left: 3px solid var(--accent);
  padding: 16px 20px; margin: 12px 0; font-size: 15px; line-height: 2.1;
  border-radius: 0 8px 8px 0;
}
.grammar-table {
  width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 14px;
  text-align: center;
}
.grammar-table th { background: var(--bg4); padding: 12px 16px; text-align: center; font-weight: 700; }
.grammar-table td { padding: 12px 16px; border-bottom: 1px solid var(--bg3); line-height: 1.8; }
.grammar-table tr:nth-child(even) td { background: rgba(255,255,255,.02); }
.grammar-table tr:hover td { background: rgba(56,189,248,.06); }
/* ═══ Problems ═══ */
.problem-item {
  background: var(--bg3); border-radius: 10px; padding: 18px 22px;
  margin-bottom: 12px; border-left: 4px solid var(--bg4);
}
.problem-item.diff-basic { border-left-color: var(--green); }
.problem-item.diff-medium { border-left-color: var(--orange); }
.problem-item.diff-hard { border-left-color: var(--red); }
.problem-item .diff-badge {
  display: inline-block; font-size: 11px; padding: 2px 8px;
  border-radius: 4px; font-weight: 700; margin-right: 8px;
}
.diff-badge.basic { background: rgba(34,197,94,.15); color: var(--green); }
.diff-badge.medium { background: rgba(245,158,11,.15); color: var(--orange); }
.diff-badge.hard { background: rgba(239,68,68,.15); color: var(--red); }
.problem-item .p-q { font-size: 15px; font-weight: 500; margin: 10px 0; line-height: 1.9; }
.problem-item .p-opts { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
.problem-item .p-opts label {
  display: flex; align-items: center; gap: 8px; padding: 10px 16px; min-height: 44px;
  background: var(--bg2); border-radius: 8px; cursor: pointer;
  font-size: 15px; border: 1px solid var(--bg4); transition: all .15s;
}
.problem-item .p-opts label:hover { border-color: var(--accent); background: rgba(56,189,248,.06); }
.problem-item .p-opts label:has(input:checked) { border-color: var(--accent); background: rgba(56,189,248,.1); }
.problem-item .p-opts input[type=radio] { accent-color: var(--accent); width: 16px; height: 16px; }
.p-answer { display: none; margin-top: 12px; padding: 14px 18px; border-radius: 8px; font-size: 14px; line-height: 1.9; }
.p-answer.show { display: block; }
.p-answer.correct { background: rgba(34,197,94,.08); border: 1px solid rgba(34,197,94,.25); }
.p-answer.wrong { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.25); }
/* ═══ Quiz ═══ */
.quiz-section {
  background: var(--bg2); border-radius: 12px; padding: 26px;
  margin-top: 24px; border: 2px solid var(--accent);
}
.quiz-section h3 { font-size: 18px; margin-bottom: 8px; color: var(--accent); }
.quiz-section .quiz-meta { font-size: 13px; color: var(--text2); margin-bottom: 18px; }
.quiz-result { display: none; margin-top: 18px; padding: 18px 22px; border-radius: 10px; font-size: 15px; }
.quiz-result.show { display: block; }
.quiz-result.good { background: rgba(34,197,94,.08); border: 1px solid rgba(34,197,94,.25); }
.quiz-result.ok { background: rgba(245,158,11,.08); border: 1px solid rgba(245,158,11,.25); }
.quiz-result.bad { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.25); }
/* ═══ Dashboard ═══ */
.dash-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 22px; }
.dash-card {
  background: var(--bg2); border-radius: 12px; padding: 24px; border: 1px solid var(--bg3);
}
.dash-card .d-icon { font-size: 40px; margin-bottom: 8px; }
.dash-card .d-num { font-size: 40px; font-weight: 800; margin-bottom: 4px; }
.dash-card .d-label { font-size: 16px; color: var(--text2); }
.dash-card .d-sub { font-size: 13px; color: var(--text3); margin-top: 4px; }
.dash-card .d-bar { margin-top: 14px; height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.dash-card .d-fill { height: 100%; border-radius: 4px; transition: width .5s; }
.dash-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
.chip {
  font-size: 12px; padding: 3px 10px; border-radius: 12px; background: var(--bg3);
}
.chip.done { background: rgba(34,197,94,.15); color: var(--green); }
.chip.cur { background: rgba(56,189,248,.15); color: var(--accent); }
/* ═══ Check-in ═══ */
.check-area {
  background: var(--bg2); border-radius: 12px; padding: 22px; border: 1px solid var(--bg3); margin-top: 20px;
}
.check-area h3 { font-size: 16px; margin-bottom: 14px; }
.check-list { list-style: none; }
.check-list li {
  display: flex; align-items: center; gap: 12px; padding: 11px 0;
  border-bottom: 1px solid rgba(255,255,255,.03); font-size: 15px; cursor: pointer;
}
.check-list li .cb {
  width: 24px; height: 24px; border: 2px solid var(--bg3); border-radius: 6px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.check-list li.done .cb { background: var(--green); border-color: var(--green); }
.check-list li.done .cb::after { content: '✓'; color: #fff; font-size: 14px; font-weight: 700; }
/* ═══ Error Book ═══ */
.err-tabs { display: flex; gap: 8px; margin-bottom: 18px; }
.err-item {
  background: var(--bg3); border-radius: 10px; padding: 16px 20px; margin-bottom: 12px;
  border-left: 4px solid var(--red);
}
.err-item.resolved { border-left-color: var(--green); }
/* ═══ Print ═══ */
@media print {
  aside, .top-bar, .day-nav, .check-area, .btn, .quiz-section, .err-tabs { display: none !important; }
  main { margin-left: 0 !important; padding: 0 !important; max-width: 100% !important; }
  body { background: #fff; color: #000; font-size: 13px; }
  .card, .section-card, .teach-block, .poem-card, .problem-item { background: #fff; border: 1px solid #ccc; break-inside: avoid; }
  .sec-body { display: block !important; }
  .formula-block { background: #f5f8ff; border-left: 3px solid #333; }
  .poem-card { background: #fffef5; }
}
/* ═══ Responsive ═══ */
@media (max-width: 768px) {
  aside { width: 60px; }
  aside .logo { font-size: 14px; padding: 0 8px 16px; }
  aside nav a { padding: 10px 8px; font-size: 12px; justify-content: center; }
  aside nav a span.nav-label { display: none; }
  aside .sb-progress { display: none; }
  main { margin-left: 60px; padding: 16px 12px; }
  .dash-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<aside>
  <div class="logo">📚 <span>分班考复习</span></div>
  <nav>
    <a class="active" id="nav-dash" onclick="showPage('dash')">
      <span>📊</span><span class="nav-label">学习总览</span>
    </a>
    <a id="nav-ch" onclick="showPage('chinese')">
      <span>📖</span><span class="nav-label">语文</span>
    </a>
    <a id="nav-ma" onclick="showPage('math')">
      <span>📐</span><span class="nav-label">数学</span>
    </a>
    <a id="nav-en" onclick="showPage('english')">
      <span>🔤</span><span class="nav-label">英语</span>
    </a>
    <a id="nav-err" onclick="showPage('errors')">
      <span>📝</span><span class="nav-label">错题本</span>
    </a>
  </nav>
  <div class="sb-progress">
    <div class="sb-label">总进度</div>
    <div class="sb-bar"><div class="sb-fill" id="sb-bar" style="width:0%"></div></div>
    <div class="sb-label" id="sb-pct" style="text-align:right">0/36天</div>
  </div>
</aside>

<main>
  <div class="page active" id="page-dash"></div>
  <div class="page" id="page-chinese"></div>
  <div class="page" id="page-math"></div>
  <div class="page" id="page-english"></div>
  <div class="page" id="page-errors"></div>
</main>

<!-- Content Data -->
<script>
var CHINESE_DATA = {
  "name": "语文",
  "icon": "📖",
  "color": "var(--chinese)",
  "days": [
    {
      "day": 1,
      "title": "基础入门",
      "topics": "字音·《观沧海》·《论语》·概括",
      "sections": [
        {
          "type": "基础运用",

          "content": "<p><b>一、得体三要素</b></p>\n<table class=\"grammar-table\"><tr><th>要素</th><th>要求</th><th>示例</th></tr>\n<tr><td>看场合</td><td>正式场合用书面语，日常场合可口语化</td><td>班会上：\"同学们，我来负责。\"（非\"哥们儿，这事交给我\"）</td></tr>\n<tr><td>看对象</td><td>对长辈用敬语，对同龄友好亲切</td><td>对老师：\"您听懂了吗？\"→\"老师，我讲清楚了吗？\"</td></tr>\n<tr><td>看身份</td><td>注意上下级、师生、长幼关系</td><td>对校长用\"汇报\"，对同学用\"说说\"</td></tr></table>\n\n<p><b>二、常用敬辞与谦辞</b></p>\n<table class=\"grammar-table\"><tr><th>敬辞（用于对方）</th><th>含义</th><th>谦辞（用于自己）</th><th>含义</th></tr>\n<tr><td>令尊</td><td>对方的父亲</td><td>家父</td><td>自己的父亲</td></tr>\n<tr><td>令爱</td><td>对方的女儿</td><td>小女</td><td>自己的女儿</td></tr>\n<tr><td>贵姓</td><td>对方的姓</td><td>敝姓</td><td>自己的姓</td></tr>\n<tr><td>贵庚</td><td>对方的年龄</td><td>虚度</td><td>自己的年龄</td></tr>\n<tr><td>高见</td><td>对方的见解</td><td>拙见</td><td>自己的见解</td></tr>\n<tr><td>惠顾</td><td>对方光临（商店）</td><td>拜访</td><td>自己去见别人</td></tr>\n<tr><td>奉还</td><td>归还对方物品</td><td>借用</td><td>自己借用物品</td></tr></table>\n\n<p><b>三、不同场合的得体表达</b></p>\n<table class=\"grammar-table\"><tr><th>场合</th><th>得体表达</th><th>不得体</th></tr>\n<tr><td>道歉</td><td>对不起 / 请原谅 / 很抱歉</td><td>算我错了行吧</td></tr>\n<tr><td>感谢</td><td>谢谢 / 感激不尽 / 多亏了您</td><td>谢了啊</td></tr>\n<tr><td>请求</td><td>能否麻烦您 / 请帮我 / 拜托了</td><td>你给我做一下</td></tr>\n<tr><td>拒绝</td><td>恐怕不行 / 不太方便 / 改天吧</td><td>不行，我不干</td></tr>\n<tr><td>询问</td><td>请问 / 打扰一下 / 向您请教</td><td>喂，问你个事</td></tr></table>",

          "content": "<p>陈康肃公尧咨善射当世无双公亦以此自矜。<br>尝射于家圃有卖油翁释担而立睨之久而不去。<br>见其发矢十中八九但微颔之。<br>康肃问曰汝亦知射乎吾射不亦精乎？<br>翁曰无他但手熟尔。<br>康肃忿然曰尔安敢轻吾射！<br>翁曰以我酌油知之。<br>乃取一葫芦置于地以钱覆其口徐以杓酌油沥之自钱孔入而钱不湿。<br>因曰我亦无他惟手熟尔。<br>康肃笑而遣之。</p><p  style=\"font-size:14px;color:var(--text2)\">【翻译】陈尧咨善射以此自傲。<br>有卖油翁放下担子斜眼看他十箭中八九只是微微点头。<br>陈问你懂射箭吗我射得不精吗？<br>翁说没什么只是手熟。<br>陈怒你怎么敢轻视我！<br>翁说凭我倒油知道。<br>于是取葫芦放地用铜钱盖口慢慢倒油穿过钱孔而钱不湿。<br>说我也没别的只是手熟。<br>陈笑着让他走了。</p><p><b>寓意：</b>熟能生巧。任何技艺都是反复练习的结果不可骄傲自满。</p>",

          "content": "<p><b>被动语态</b>表示主语是动作的承受者，结构为 <b>be + 过去分词</b>。</p>\n<table class=\"grammar-table\">\n<tr><th>时态</th><th>被动结构</th><th>例句</th></tr>\n<tr><td>一般现在时</td><td>am/is/are + done</td><td>English <b>is spoken</b> all over the world.</td></tr>\n<tr><td>一般过去时</td><td>was/were + done</td><td>The letter <b>was written</b> yesterday.</td></tr>\n<tr><td>一般将来时</td><td>will be + done</td><td>The work <b>will be finished</b> soon.</td></tr>\n<tr><td>现在进行时</td><td>am/is/are + being + done</td><td>The classroom <b>is being cleaned</b> now.</td></tr>\n<tr><td>现在完成时</td><td>have/has + been + done</td><td>The window <b>has been broken</b>.</td></tr>\n<tr><td>含情态动词</td><td>can/must + be + done</td><td>The rules <b>must be followed</b>.</td></tr>\n</table>\n<p><b>📌 主动变被动的步骤：</b></p>\n<ol>\n<li>找出主动句的宾语 → 变成被动句的主语</li>\n<li>根据时态确定 be 动词的形式</li>\n<li>动词变为过去分词</li>\n<li>原主语前加 by（如需要）</li>\n</ol>\n<p><b>例子：</b>Tom cleans the room every day. → The room <b>is cleaned</b> by Tom every day.</p>\n<p><b>⚠️ 注意：</b>不及物动词没有被动语态！如 happen, arrive, die, appear 等。感官动词（look, smell, taste, sound, feel）主动形式表被动含义：The flowers smell nice. ✓</p>",

          "topic": "定语从句",
          "tagColor": "#22c55e",
          "content": "<p><b>定语从句</b>用于修饰名词或代词，相当于一个形容词。被修饰的名词叫<b>先行词</b>，引导从句的词叫<b>关系词</b>。</p>\n<table class=\"grammar-table\">\n<tr><th>关系词</th><th>先行词</th><th>在从句中作</th><th>例句</th></tr>\n<tr><td><b>who</b></td><td>人</td><td>主语/宾语</td><td>The boy <b>who</b> is playing is my brother.（作主语）<br>The girl <b>who(m)</b> you met is my sister.（作宾语）</td></tr>\n<tr><td><b>which</b></td><td>物/动物</td><td>主语/宾语</td><td>The book <b>which</b> is on the desk is mine.（作主语）<br>The movie <b>which</b> we watched was great.（作宾语）</td></tr>\n<tr><td><b>that</b></td><td>人或物</td><td>主语/宾语</td><td>He is the man <b>that</b> helped me.（作主语）<br>This is the pen <b>that</b> I bought.（作宾语）</td></tr>\n<tr><td><b>whose</b></td><td>人或物</td><td>定语（…的）</td><td>I know the boy <b>whose</b> father is a doctor.<br>This is the house <b>whose</b> windows are broken.</td></tr>\n<tr><td><b>where</b></td><td>地点</td><td>状语</td><td>This is the school <b>where</b> I studied.</td></tr>\n</table>\n<p><b>📌 只能用 that 的情况：</b></p>\n<ul>\n<li>先行词被最高级修饰：the best book <b>that</b> I have ever read</li>\n<li>先行词被序数词修饰：the first thing <b>that</b> I did</li>\n<li>先行词是 all, everything, nothing, something 等不定代词</li>\n<li>先行词同时有人和物</li>\n</ul>\n<p><b>📌 只能用 which 的情况：</b>介词后 + which（The house in <b>which</b> I live is old.）非限制性定语从句。</p>",

          "content": "<p><b>状语从句</b>用于修饰主句中的动词、形容词或副词，表示时间、条件、原因、让步、结果等。</p>\n<table class=\"grammar-table\">\n<tr><th>类型</th><th>引导词</th><th>用法</th><th>例句</th></tr>\n<tr><td><b>时间状语从句</b></td><td>when, while, before, after, as soon as, until</td><td>表示动作发生的时间</td><td>I will call you <b>when</b> I arrive.</td></tr>\n<tr><td><b>条件状语从句</b></td><td>if, unless（=if not）</td><td>表示条件</td><td><b>If</b> it rains, we will stay home.<br>You'll fail <b>unless</b> you study hard.</td></tr>\n<tr><td><b>原因状语从句</b></td><td>because, since, as</td><td>表示原因</td><td>He is happy <b>because</b> he passed the exam.</td></tr>\n<tr><td><b>让步状语从句</b></td><td>although, though, even though</td><td>表示\"虽然…但是\"</td><td><b>Although</b> he is young, he knows a lot.</td></tr>\n<tr><td><b>结果状语从句</b></td><td>so...that, such...that</td><td>表示\"如此…以至于\"</td><td>He ran <b>so</b> fast <b>that</b> nobody could catch him.</td></tr>\n<tr><td><b>目的状语从句</b></td><td>so that, in order that</td><td>表示\"为了…\"</td><td>He got up early <b>so that</b> he could catch the bus.</td></tr>\n<tr><td><b>比较状语从句</b></td><td>than, as...as</td><td>表示比较</td><td>She is taller <b>than</b> I am.</td></tr>\n</table>\n<p><b>📌 关键考点：</b></p>\n<ul>\n<li><b>主将从现：</b>在时间/条件状语从句中，从句用一般现在时表将来<br>✓ If it <b>rains</b> tomorrow, I <b>will stay</b> at home.<br>✗ If it will rain tomorrow, I will stay at home.</li>\n<li><b>although/though 不与 but 连用：</b><br>✓ Although he is tired, he keeps working.<br>✗ Although he is tired, but he keeps working.</li>\n<li><b>so...that vs such...that：</b>so + 形容词/副词 + that；such + 名词短语 + that<br>He is <b>so</b> clever <b>that</b> everyone likes him.<br>He is <b>such</b> a clever boy <b>that</b> everyone likes him.</li>\n</ul>",

          ],
          "ans": 2,
          "exp": "house 是地点，用 where（= in which）。"
        },
        {
          "topic": "状语从句",
          "q": "___ he is very busy, he always helps others.",
          "opts": [
            "A. Because",
            "B. If",
            "C. When",
            "D. Although"
          ],
          "ans": 3,
          "exp": "虽然忙但还是帮助别人，用 Although。"
        },
        {
          "topic": "宾语从句",
          "q": "Could you tell me ___ ?",
          "opts": [
            "A. how I can get to the station",
            "B. how can I get to the station",
            "C. how do I get to the station",
            "D. how I get to the station"
          ],
          "ans": 0,
          "exp": "宾语从句用陈述语序，could 委婉语气，从句用 can。"
        }
      ]
    }
  ]
};

</script><script onerror="console.warn('English data not loaded')"></script>

<script>
// ═══════════════════════════════════════════
//  STATE MANAGEMENT
// ═══════════════════════════════════════════
var SUBJECTS = {}; // populated from data files
var curSubj = 'chinese';
var curDay = 0;
var STATE = { done: {}, scores: {}, errors: [], checks: {}, quizResults: {} };

try {
  var saved = JSON.parse(localStorage.getItem('xsc_review_v3') || '{}');
  STATE.done = saved.done || {};
  STATE.scores = saved.scores || {};
  STATE.errors = saved.errors || [];
  STATE.checks = saved.checks || {};
  STATE.quizResults = saved.quizResults || {};
} catch(e) {}

function saveState() {
  localStorage.setItem('xsc_review_v3', JSON.stringify(STATE));
  updateSidebar();
}

function $(id) { return document.getElementById(id); }

function getSubjId(s) {
  return (s === 'chinese') ? 'ch' : (s === 'math' ? 'ma' : 'en');
}

function isDayDone(s, d) {
  return !!STATE.done[getSubjId(s) + '-' + d];
}

function getScore(s, d) {
  var key = getSubjId(s) + '-' + d;
  return STATE.scores[key] || (STATE.quizResults[key] ? STATE.quizResults[key].score : null);
}

// ═══════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════
function showPage(page) {
  var pages = ['dash', 'chinese', 'math', 'english', 'errors'];
  for (var i = 0; i < pages.length; i++) {
    $('page-' + pages[i]).classList.remove('active');
    var n = $('nav-' + pages[i]);
    if (n) n.classList.remove('active');
  }
  $('page-' + page).classList.add('active');
  var navId = (page === 'errors') ? 'err' : page;
  var n = $('nav-' + navId);
  if (n) n.classList.add('active');

  if (page === 'dash') { renderDash(); }
  else if (page === 'errors') { renderErrors('active'); }
  else { curSubj = page; curDay = 0; renderDay(); }
  updateSidebar();
  window.scrollTo(0, 0);
}

var STUDY_START = Date.now();
try { STUDY_START = parseInt(localStorage.getItem('xsc_study_start') || Date.now()); } catch(e) {}
function saveStudyStart() { localStorage.setItem('xsc_study_start', String(STUDY_START)); }
saveStudyStart();

function getStudyDays() {
  var days = 0;
  try {
    var saved = JSON.parse(localStorage.getItem('xsc_review_v3') || '{}');
    var done = saved.done || {};
    for (var k in done) { if (done[k]) days++; }
  } catch(e) {}
  return Math.max(1, Math.ceil((Date.now() - STUDY_START) / 86400000));
}

// ═══════════════════════════════════════════
//  DASHBOARD (enhanced)
// ═══════════════════════════════════════════
function renderDash() {
  var subs = [
    { key: 'chinese', id: 'ch', name: '语文', icon: '📖', color: 'var(--chinese)' },
    { key: 'math', id: 'ma', name: '数学', icon: '📐', color: 'var(--math)' },
    { key: 'english', id: 'en', name: '英语', icon: '🔤', color: 'var(--english)' }
  ];
  var totalDone = 0, totalProblems = 0, totalCorrect = 0;
  var subjectStats = {};

  for (var s = 0; s < subs.length; s++) {
    var sb = subs[s];
    var dn = 0, totalSc = 0, scCount = 0, subjTotalQ = 0, subjCorrect = 0;
    for (var d = 1; d <= 12; d++) {
      if (isDayDone(sb.key, d)) {
        dn++;
        var sc = getScore(sb.key, d);
        if (sc !== null) { totalSc += sc; scCount++; }
        var qrKey = sb.id + '-' + d;
        var qr = STATE.quizResults[qrKey];
        if (qr) { subjTotalQ += qr.total; subjCorrect += qr.correct; }
      }
    }
    totalDone += dn;
    totalProblems += subjTotalQ;
    totalCorrect += subjCorrect;
    var avg = scCount > 0 ? Math.round(totalSc / scCount) : 0;
    var pct = Math.round(dn / 12 * 100);
    subjectStats[sb.key] = { done: dn, avg: avg, pct: pct, totalQ: subjTotalQ, correct: subjCorrect };
  }

  var h = '<div class="top-bar"><h1>📊 学习总览</h1>';
  h += '<span class="meta">' + new Date().toLocaleDateString('zh-CN', {year:'numeric',month:'long',day:'numeric',weekday:'long'}) + '</span>';
  h += '</div>';

  var activeErrs = 0;
  for (var i = 0; i < STATE.errors.length; i++) { if (!STATE.errors[i].resolved) activeErrs++; }
  var studyDays = getStudyDays();
  var totalPct = Math.round(totalDone / 36 * 100);
  var overallAcc = totalProblems > 0 ? Math.round(totalCorrect / totalProblems * 100) : 0;

  h += '<div class="quick-stats">';
  h += '<div class="quick-stat"><div class="qs-val" style="color:var(--accent)">' + totalPct + '%</div><div class="qs-label">总进度 ' + totalDone + '/36天</div></div>';
  h += '<div class="quick-stat"><div class="qs-val" style="color:var(--green)">' + overallAcc + '%</div><div class="qs-label">正确率 ' + totalCorrect + '/' + totalProblems + '题</div></div>';
  h += '<div class="quick-stat"><div class="qs-val" style="color:var(--red)">' + activeErrs + '</div><div class="qs-label">待复习错题</div></div>';
  h += '<div class="quick-stat"><div class="qs-val" style="color:var(--orange)">' + studyDays + '天</div><div class="qs-label">已学习天数</div></div>';
  h += '</div>';

  h += '<div class="kmap"><h3>🗺️ 知识地图</h3>';
  for (var s = 0; s < subs.length; s++) {
    var sb = subs[s];
    var course = SUBJECTS[sb.key];
    if (!course) continue;
    h += '<div class="kmap-row"><div class="kmap-label">' + sb.icon + ' ' + sb.name + '</div><div class="kmap-items">';
    for (var d = 0; d < 12; d++) {
      var dayData = course.days[d];
      var isD = isDayDone(sb.key, d+1);
      var ds = getScore(sb.key, d+1);
      var cls = isD ? 'learned' : '';
      if (!isD && d === subjectStats[sb.key].done) cls = 'current';
      h += '<span class="kmap-chip ' + cls + '" title="' + dayData.title + (isD && ds !== null ? ' · ' + ds + '分' : '') + '" onclick="showPage(\'' + sb.key + '\');curDay=' + d + ';renderDay();">D' + (d+1) + ' ' + dayData.title + '</span>';
    }
    h += '</div></div>';
  }
  h += '</div>';

  h += '<div class="dash-grid">';
  for (var s = 0; s < subs.length; s++) {
    var sb = subs[s];
    var st = subjectStats[sb.key];
    h += '<div class="dash-card">';
    h += '<div class="d-icon">' + sb.icon + '</div>';
    h += '<div class="d-num" style="color:' + sb.color + '">' + st.done + '<span style="font-size:22px;color:var(--text3)">/12</span></div>';
    h += '<div class="d-label">' + sb.name + '</div>';
    h += '<div class="d-sub">' + st.pct + '%' + (st.avg > 0 ? ' · 均分' + st.avg : '') + (st.totalQ > 0 ? ' · 正确率' + Math.round(st.correct/st.totalQ*100) + '%' : '') + '</div>';
    h += '<div class="d-bar"><div class="d-fill" style="width:' + st.pct + '%;background:' + sb.color + '"></div></div>';
    h += '<div class="dash-chips">';
    for (var d = 0; d < 12; d++) {
      var isD = isDayDone(sb.key, d+1);
      var ds = getScore(sb.key, d+1);
      var cls = isD ? 'done' : '';
      if (!isD && d === st.done) cls = 'cur';
      h += '<span class="chip ' + cls + '" onclick="showPage(\'' + sb.key + '\');curDay=' + d + ';renderDay();" style="cursor:pointer" title="' + (isD ? '已完成' + (ds !== null ? ' · ' + ds + '分' : '') : '点击开始学习') + '">D' + (d+1) + (ds !== null ? ' ' + ds + '分' : '') + '</span>';
    }
    h += '</div></div>';
  }
  h += '</div>';

  if (totalDone > 0) {
    h += '<div class="rpt-mini"><h3>📊 最近学习动态</h3>';
    var allResults = [];
    for (var si = 0; si < subs.length; si++) {
      for (var di = 1; di <= 12; di++) {
        var key = subs[si].id + '-' + di;
        var qr = STATE.quizResults[key];
        if (qr) allResults.push({ subj: subs[si], day: di, qr: qr });
      }
    }
    allResults.sort(function(a, b) { return b.qr.ts - a.qr.ts; });
    var count = Math.min(allResults.length, 5);
    if (count === 0) {
      h += '<div style="font-size:14px;color:var(--text2)">完成第一次测验后这里会显示最近动态</div>';
    } else {
      for (var ri = 0; ri < count; ri++) {
        var r = allResults[ri];
        h += '<div class="rpt-mini-item">';
        h += '<span>' + r.subj.icon + ' ' + r.subj.name + ' Day ' + r.day + '</span>';
        h += '<span style="color:' + (r.qr.score >= 80 ? 'var(--green)' : (r.qr.score >= 60 ? 'var(--orange)' : 'var(--red)')) + ';font-weight:700">' + r.qr.score + '分</span>';
        h += '<span style="font-size:12px;color:var(--text3)">' + new Date(r.qr.ts).toLocaleDateString('zh-CN') + '</span>';
        h += '</div>';
      }
    }
    h += '</div>';
  }

  var nextStep = '';
  if (totalDone < 36) {
    for (var s = 0; s < subs.length; s++) {
      for (var d = 1; d <= 12; d++) {
        if (!isDayDone(subs[s].key, d)) {
          nextStep = '👉 建议继续：<a href="javascript:void(0)" onclick="showPage(\'' + subs[s].key + '\');curDay=' + (d-1) + ';renderDay();" style="color:var(--accent);text-decoration:none;font-weight:700">' + subs[s].icon + ' ' + subs[s].name + ' Day ' + d + '</a>';
          break;
        }
      }
      if (nextStep) break;
    }
  } else {
    nextStep = '🎉 全部完成！建议复习错题本。';
  }
  h += '<div class="card" style="text-align:center"><div style="font-size:16px">' + nextStep + '</div></div>';

  $('page-dash').innerHTML = h;
}

// ═══════════════════════════════════════════
//  DAY RENDER
// ═══════════════════════════════════════════
function renderDay() {
  var course = SUBJECTS[curSubj];
  if (!course) {
    $('page-' + curSubj).innerHTML = '<div class="card" style="text-align:center;padding:60px"><p style="font-size:18px;color:var(--text2)">⏳ 数据加载中…</p></div>';
    return;
  }
  var d = course.days[curDay];
  var pId = getSubjId(curSubj);
  var qkey = pId + '-' + (curDay + 1);
  var prevQuiz = STATE.quizResults[qkey];

  var h = '<div class="top-bar"><h1>' + course.icon + ' ' + course.name + ' · Day ' + (curDay + 1) + '</h1>';
  h += '<span class="meta">' + d.title + ' | ' + d.topics + '</span>';
  h += '<div><button class="btn btn-print" onclick="window.print()">🖨️ 打印</button></div></div>';

  // Day nav
  h += '<div class="day-nav">';
  for (var i = 0; i < 12; i++) {
    var cls = (i === curDay) ? 'active' : '';
    if (isDayDone(curSubj, i + 1)) cls += ' done';
    h += '<button class="' + cls + '" onclick="goDay(' + i + ')">' + (i + 1) + '</button>';
  }
  h += '</div>';

  // Day card
  h += '<div class="card" style="padding:14px 22px"><b>📅 Day ' + (curDay + 1) + '：' + d.title + '</b> | ' + d.topics;
  if (isDayDone(curSubj, curDay + 1)) {
    var sc = getScore(curSubj, curDay + 1);
    h += ' | <span style="color:var(--green)">✅ 已完成' + (sc !== null ? ' · 测验' + sc + '分' : '') + '</span>';
  }
  h += '</div>';

  // Sections
  for (var s = 0; s < d.sections.length; s++) {
    var sec = d.sections[s];
    var sId = 'sec-' + pId + '-' + s;
    h += '<div class="section-card open" id="' + sId + '">';
    h += '<div class="sec-hdr" onclick="toggleSec(\'' + sId + '\')">';
    h += '<div class="s-left">';
    h += '<span class="s-tag" style="background:' + (sec.tagColor || '#64748b') + '18;color:' + (sec.tagColor || '#64748b') + '">' + sec.type + '</span>';
    h += '<span class="s-topic">' + sec.topic + '</span>';
    h += '</div><span class="s-arrow">▼</span></div>';
    h += '<div class="sec-body">';

    // Content (use backtick-delimited content from data)
    if (sec.content) {
      h += '<div class="teach-block">' + sec.content + '</div>';
    }

    // Problems
    if (sec.problems && sec.problems.length > 0) {
      h += '<div style="font-size:15px;font-weight:700;margin:14px 0 10px">📝 分层练习</div>';
      for (var p = 0; p < sec.problems.length; p++) {
        var prob = sec.problems[p];
        var dc = prob.diff === 'basic' ? 'diff-basic' : (prob.diff === 'medium' ? 'diff-medium' : 'diff-hard');
        var dl = prob.diff === 'basic' ? '基础🟢' : (prob.diff === 'medium' ? '中级🟠' : '高级🔴');
        var db = prob.diff === 'basic' ? 'basic' : (prob.diff === 'medium' ? 'medium' : 'hard');
        var pid = 'prob-' + pId + '-' + curDay + '-' + s + '-' + p;

        h += '<div class="problem-item ' + dc + '" id="' + pid + '">';
        h += '<span class="diff-badge ' + db + '">' + dl + '</span>';
        h += '<div class="p-q">' + (p + 1) + '. ' + prob.q + '</div>';
        if (prob.opts) {
          h += '<div class="p-opts">';
          for (var o = 0; o < prob.opts.length; o++) {
            h += '<label><input type="radio" name="' + pid + '" value="' + o + '" onchange="checkAnswer(this)"> ' + prob.opts[o] + '</label>';
          }
          h += '</div>';
        }
        h += '<div class="p-answer" id="ans-' + pid + '"></div>';
        h += '</div>';
      }
    }

    // Videos
    if (sec.videos && sec.videos.length > 0) {
      h += '<div style="margin-top:12px;padding:10px 0;border-top:1px solid var(--bg4)">';
      h += '<span style="font-size:13px;color:var(--text3)">📺 相关视频：</span>';
      for (var v = 0; v < sec.videos.length; v++) {
        var vid = sec.videos[v];
        h += ' <a href="' + vid.u + '" target="_blank" style="color:var(--accent);font-size:13px;text-decoration:none;margin:0 6px">' + vid.p + '：' + vid.t + '</a>';
      }
      h += '</div>';
    }

    h += '</div></div>'; // close sec-body, section-card
  }

  // Quiz section
  if (d.quiz && d.quiz.length > 0) {
    h += '<div class="quiz-section" id="quiz-' + pId + '">';
    if (prevQuiz) {
      var qr = prevQuiz;
      var cls = qr.score >= 80 ? 'good' : (qr.score >= 60 ? 'ok' : 'bad');
      var emoji = qr.score >= 80 ? '🎉' : (qr.score >= 60 ? '👍' : '💪');
      h += '<h3>📋 Day ' + (curDay + 1) + ' 测验成绩：' + emoji + ' <span style="color:' + (qr.score >= 80 ? 'var(--green)' : (qr.score >= 60 ? 'var(--orange)' : 'var(--red)')) + '">' + qr.score + '分</span>（' + qr.correct + '/' + qr.total + '）</h3>';
      h += '<p class="quiz-meta">' + new Date(qr.ts).toLocaleString('zh-CN') + '</p>';
      h += '<div class="quiz-result show ' + cls + '" style="display:block">';
      for (var q = 0; q < qr.answers.length; q++) {
        var ans = qr.answers[q];
        var qzOrig = d.quiz[q];
        var isR = ans.isRight;
        h += '<div class="problem-item ' + (isR ? 'diff-basic' : 'diff-hard') + '" style="margin-bottom:10px">';
        h += '<span style="font-weight:700;color:' + (isR ? 'var(--green)' : 'var(--red)') + ';font-size:15px">' + (isR ? '✅' : '❌') + ' ' + (q + 1) + '.</span>';
        h += ' <span style="font-size:11px;color:var(--text3)">[' + (ans.topic || qzOrig.topic) + ']</span>';
        h += ' <span style="font-size:14px">' + qzOrig.q + '</span>';
        h += '<div style="margin:6px 0;font-size:13px;line-height:2.0">';
        for (var o = 0; o < qzOrig.opts.length; o++) {
          var oStyle = '', oMark = '';
          if (o === qzOrig.ans) {
            oStyle = 'color:var(--green);font-weight:700';
            oMark = ' ← ✅ 正确';
          }
          if (!isR && o === ans.user) {
            oStyle = 'color:var(--red);font-weight:700;text-decoration:line-through';
            oMark = ' ← ❌ 你的选择';
          }
          h += '<div style="' + oStyle + '">' + qzOrig.opts[o] + oMark + '</div>';
        }
        h += '</div>';
        if (!isR) {
          h += '<div style="font-size:12px;color:var(--text2);line-height:1.8;padding:8px 12px;background:rgba(239,68,68,.04);border-radius:6px;margin-top:4px"><b>💡 解析：</b>' + qzOrig.exp + '</div>';
        } else {
          h += '<div style="font-size:12px;color:var(--green);padding:4px 10px">✅ 正确！</div>';
        }
        h += '</div>';
      }
      h += '</div>';
      h += '<button class="btn btn-sm" style="background:var(--bg3);color:var(--text);margin-top:8px" onclick="retakeQuiz()">🔄 重新测验</button>';
    } else {
      h += '<h3>📋 Day ' + (curDay + 1) + ' 考察测验（共' + d.quiz.length + '题）</h3>';
      h += '<p class="quiz-meta">做完点击提交查看成绩。错题自动收录到错题本。</p>';
      for (var q = 0; q < d.quiz.length; q++) {
        var qz = d.quiz[q];
        h += '<div class="problem-item diff-medium" style="margin-bottom:10px">';
        h += '<span class="diff-badge" style="background:rgba(56,189,248,.12);color:var(--accent);font-size:10px">' + (qz.topic || '综合') + '</span>';
        h += '<div class="p-q">' + (q + 1) + '. ' + qz.q + '</div>';
        if (qz.opts) {
          h += '<div class="p-opts">';
          for (var oo = 0; oo < qz.opts.length; oo++) {
            h += '<label><input type="radio" name="qz-' + pId + '-' + curDay + '-' + q + '" value="' + oo + '"> ' + qz.opts[oo] + '</label>';
          }
          h += '</div>';
        }
        h += '</div>';
      }
      h += '<button class="btn btn-primary" onclick="submitQuiz()">📝 提交测验</button>';
      h += '<div class="quiz-result" id="qz-result-' + pId + '"></div>';
    }
    h += '</div>';
  }

  // Daily report button
  h += '<div style="margin-top:14px;text-align:center">';
  h += '<button class="btn btn-sm" style="background:var(--bg3);color:var(--text)" onclick="showDailyReport()">📊 查看每日学习日报</button>';
  h += '</div>';

  // Check-in
  h += '<div class="check-area"><h3>✅ 今日打卡</h3><ul class="check-list">';
  var cks = ['完成知识点学习', '完成分层练习', '完成考察测验', '观看推荐视频'];
  for (var c = 0; c < cks.length; c++) {
    var ck = pId + '-' + curDay + '-' + c;
    var cd = !!STATE.checks[ck];
    h += '<li class="' + (cd ? 'done' : '') + '" onclick="toggleCheck(\'' + ck + '\', this)">';
    h += '<span class="cb"></span><span>' + cks[c] + '</span></li>';
  }
  h += '</ul></div>';

  $('page-' + curSubj).innerHTML = h;
  updateSidebar();
}

function goDay(i) {
  curDay = i;
  renderDay();
  window.scrollTo(0, 0);
}

function toggleSec(id) {
  document.getElementById(id).classList.toggle('open');
}

// ═══════════════════════════════════════════
//  PROBLEM CHECK
// ═══════════════════════════════════════════
function checkAnswer(el) {
  // Parse problem ID from radio name: prob-{pId}-{day}-{section}-{problemIdx}
  var parts = el.name.split('-');
  var pId = parts[1];
  var day = parseInt(parts[2]);
  var sIdx = parseInt(parts[3]);
  var pIdx = parseInt(parts[4]);
  var userAns = parseInt(el.value);

  var course = SUBJECTS[curSubj];
  var prob = course.days[day].sections[sIdx].problems[pIdx];
  var correctAns = prob.ans;
  var exp = prob.exp;

  var ansDiv = $('ans-' + el.name);
  var isCorrect = (userAns === correctAns);
  var labelMap = ['A', 'B', 'C', 'D'];

  ansDiv.className = 'p-answer show ' + (isCorrect ? 'correct' : 'wrong');

  if (isCorrect) {
    ansDiv.innerHTML = '<div style="font-size:16px"><b style="color:var(--green)">✅ 正确！</b></div>' +
      '<div style="font-size:14px;color:var(--text2);line-height:1.9"><b>答案：</b>' + labelMap[correctAns] + '<br><b>解析：</b>' + exp + '</div>';
  } else {
    ansDiv.innerHTML = '<div style="font-size:16px"><b style="color:var(--red)">❌ 错误</b></div>' +
      '<div style="font-size:14px;line-height:2.0;color:var(--text2)">' +
      '<div>你的答案：<span style="color:var(--red);font-weight:700">' + labelMap[userAns] + '</span> 正确答案：<span style="color:var(--green);font-weight:700">' + labelMap[correctAns] + '</span></div>' +
      '<div style="margin-top:6px"><b>📖 解析：</b>' + exp + '</div>' +
      '<div style="border-top:1px solid var(--bg4);padding-top:8px;margin-top:8px"><b>🔍 错误原因：</b>' + (userAns < 0 ? '未作答' : '选项' + labelMap[userAns] + '判断错误，可能混淆了关键概念或忽略了限定条件') + '</div>' +
      '</div>';

    // Record error
    var subjName = pId === 'ch' ? '语文' : (pId === 'ma' ? '数学' : '英语');
    STATE.errors.unshift({
      subj: subjName,
      day: day + 1,
      topic: course.days[day].sections[sIdx].topic,
      q: prob.q,
      userAns: labelMap[userAns],
      correctAns: labelMap[correctAns],
      explanation: exp,
      reason: '选项' + labelMap[userAns] + '错误，混淆概念或忽略条件',
      ts: Date.now(),
      resolved: false
    });
    saveState();
  }
}

// ═══════════════════════════════════════════
//  QUIZ
// ═══════════════════════════════════════════
function submitQuiz() {
  var course = SUBJECTS[curSubj];
  var d = course.days[curDay];
  var pId = getSubjId(curSubj);
  var quiz = d.quiz;
  var correct = 0;
  var total = quiz.length;
  var results = [];

  for (var q = 0; q < total; q++) {
    var qz = quiz[q];
    var radios = document.getElementsByName('qz-' + pId + '-' + curDay + '-' + q);
    var sel = -1;
    for (var r = 0; r < radios.length; r++) {
      if (radios[r].checked) sel = parseInt(radios[r].value);
    }
    var isR = (sel === qz.ans);
    if (isR) correct++;
    results.push({ topic: qz.topic, user: sel, correct: qz.ans, exp: qz.exp, isRight: isR });
  }

  var score = Math.round(correct / total * 100);
  var key = pId + '-' + (curDay + 1);
  STATE.scores[key] = score;
  STATE.done[key] = true;
  STATE.quizResults[key] = {
    score: score,
    correct: correct,
    total: total,
    answers: results,
    ts: Date.now()
  };

  // Record wrong answers
  var labelMap = ['A', 'B', 'C', 'D'];
  for (var q = 0; q < results.length; q++) {
    if (!results[q].isRight) {
      var subjName = pId === 'ch' ? '语文' : (pId === 'ma' ? '数学' : '英语');
      STATE.errors.unshift({
        subj: subjName,
        day: curDay + 1,
        topic: results[q].topic || quiz[q].topic,
        q: quiz[q].q,
        userAns: results[q].user >= 0 ? labelMap[results[q].user] : '未答',
        correctAns: labelMap[results[q].correct],
        explanation: results[q].exp,
        reason: '测验错题',
        ts: Date.now(),
        resolved: false
      });
    }
  }
  saveState();

  var rd = $('qz-result-' + pId);
  var cls = score >= 80 ? 'good' : (score >= 60 ? 'ok' : 'bad');
  rd.className = 'quiz-result show ' + cls;
  rd.innerHTML = '<b>' + (score >= 80 ? '🎉 ' : (score >= 60 ? '👍 ' : '💪 ')) +
    '测验成绩：' + score + '分</b>（' + correct + '/' + total + '）<br>' +
    (score >= 80 ? '表现优秀！继续保持！' : (score >= 60 ? '还不错，建议复习错题。' : '需要加强复习！')) +
    '<br><span style="font-size:13px;color:var(--text2)">错题已自动收录到错题本。</span>';

  renderDay();
  var qs = $('quiz-' + pId);
  if (qs) setTimeout(function() { qs.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
}

function retakeQuiz() {
  var pId = getSubjId(curSubj);
  var key = pId + '-' + (curDay + 1);
  delete STATE.quizResults[key];
  delete STATE.done[key];
  delete STATE.scores[key];
  saveState();
  renderDay();
}

// ═══════════════════════════════════════════
//  CHECK-IN
// ═══════════════════════════════════════════
function toggleCheck(ck, el) {
  STATE.checks[ck] = !STATE.checks[ck];
  saveState();
  el.classList.toggle('done');
}

// ═══════════════════════════════════════════
//  DAILY REPORT
// ═══════════════════════════════════════════
function showDailyReport() {
  var course = SUBJECTS[curSubj];
  var d = course.days[curDay];
  var pId = getSubjId(curSubj);
  var key = pId + '-' + (curDay + 1);
  var qr = STATE.quizResults[key];
  var subjName = pId === 'ch' ? '语文' : (pId === 'ma' ? '数学' : '英语');
  var dayErrs = [];
  for (var i = 0; i < STATE.errors.length; i++) {
    if (STATE.errors[i].subj === subjName && STATE.errors[i].day === curDay + 1) {
      dayErrs.push(STATE.errors[i]);
    }
  }

  var h = '<div style="background:var(--bg2);border-radius:12px;padding:28px;max-width:850px;margin:0 auto">';
  h += '<h2 style="text-align:center;margin-bottom:4px">📊 ' + course.icon + ' ' + course.name + ' Day ' + (curDay + 1) + ' 学习日报</h2>';
  h += '<p style="text-align:center;color:var(--text2);font-size:13px;margin-bottom:20px">' + d.title + ' | ' + new Date().toLocaleDateString('zh-CN') + '</p>';

  // Summary cards
  h += '<div style="display:flex;gap:14px;margin-bottom:18px">';
  h += '<div style="flex:1;background:var(--bg3);border-radius:8px;padding:16px;text-align:center">';
  h += '<div style="font-size:30px;font-weight:800;color:' + (qr ? (qr.score >= 80 ? 'var(--green)' : (qr.score >= 60 ? 'var(--orange)' : 'var(--red)')) : 'var(--text3)') + '">' + (qr ? qr.score + '分' : '未测') + '</div>';
  h += '<div style="font-size:12px;color:var(--text2)">测验成绩</div></div>';
  h += '<div style="flex:1;background:var(--bg3);border-radius:8px;padding:16px;text-align:center">';
  h += '<div style="font-size:30px;font-weight:800;color:var(--accent)">' + d.sections.length + '</div>';
  h += '<div style="font-size:12px;color:var(--text2)">知识点</div></div>';
  h += '<div style="flex:1;background:var(--bg3);border-radius:8px;padding:16px;text-align:center">';
  h += '<div style="font-size:30px;font-weight:800;color:var(--red)">' + dayErrs.length + '</div>';
  h += '<div style="font-size:12px;color:var(--text2)">错题</div></div>';
  h += '</div>';

  // Knowledge points
  h += '<div style="background:var(--bg3);border-radius:8px;padding:16px;margin-bottom:12px"><b>📖 今日知识点</b>';
  h += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px">';
  for (var s = 0; s < d.sections.length; s++) {
    h += '<span style="font-size:12px;padding:4px 12px;background:var(--bg2);border-radius:14px">' + d.sections[s].type + '：' + d.sections[s].topic + '</span>';
  }
  h += '</div></div>';

  // Quiz details
  if (qr) {
    h += '<div style="background:var(--bg3);border-radius:8px;padding:16px;margin-bottom:12px"><b>📝 测验详情（' + qr.score + '分）</b>';
    for (var q = 0; q < qr.answers.length; q++) {
      var a = qr.answers[q];
      var qz = d.quiz[q];
      h += '<div style="margin-top:8px;font-size:14px">' + (a.isRight ? '✅' : '❌') + ' ' + (q + 1) + '. ' + qz.q + ' → ' + (a.isRight ? '正确' : '错误（正确：' + ['A','B','C','D'][qz.ans] + '）') + '</div>';
    }
    h += '</div>';
  }

  // Errors
  if (dayErrs.length > 0) {
    h += '<div style="background:var(--bg3);border-radius:8px;padding:16px;margin-bottom:12px"><b>📝 今日错题</b>';
    for (var e = 0; e < dayErrs.length; e++) {
      var err = dayErrs[e];
      h += '<div style="margin-top:8px;font-size:14px;line-height:1.8">' + (e + 1) + '. ' + err.q + '<br>你的：<span style="color:var(--red)">' + err.userAns + '</span> → 正确：<b style="color:var(--green)">' + err.correctAns + '</b><br>💡 ' + err.explanation + '</div>';
    }
    h += '</div>';
  }

  // Review advice
  h += '<div style="background:var(--bg3);border-radius:8px;padding:16px"><b>📌 复习建议</b>';
  if (!qr) {
    h += '<p style="font-size:14px;margin-top:6px">尚未完成测验，建议先完成考察测验。</p>';
  } else if (qr.score >= 80) {
    h += '<p style="font-size:14px;margin-top:6px;color:var(--green)">表现优秀！继续保持当前学习节奏。</p>';
  } else if (qr.score >= 60) {
    h += '<p style="font-size:14px;margin-top:6px">建议重点复习错题本中的相关题目，尤其关注：' + 
      (dayErrs.length > 0 ? dayErrs.map(function(e) { return e.topic; }).filter(function(v, i, a) { return a.indexOf(v) === i; }).join('、') : '所有知识点') + '</p>';
  } else {
    h += '<p style="font-size:14px;margin-top:6px;color:var(--red)">成绩偏低，建议重新学习今日全部知识点后再测验。</p>';
  }
  h += '</div>';

  h += '<div style="text-align:center;margin-top:18px">';
  h += '<button class="btn btn-print" onclick="window.print()">🖨️ 打印日报</button> ';
  h += '<button class="btn btn-sm" style="background:var(--bg3);color:var(--text)" onclick="renderDay()">← 返回</button>';
  h += '</div></div>';

  $('page-' + curSubj).innerHTML = h;
  window.scrollTo(0, 0);
}

// ═══════════════════════════════════════════
//  ERROR BOOK
// ═══════════════════════════════════════════
function renderErrors(tab) {
  tab = tab || 'active';
  var h = '<div class="top-bar"><h1>📝 错题本</h1>';
  h += '<div class="err-tabs">';
  h += '<button class="btn btn-sm" style="background:' + (tab === 'active' ? 'var(--accent)' : 'var(--bg3)') + ';color:' + (tab === 'active' ? '#0f172a' : 'var(--text)') + '" onclick="renderErrors(\'active\')">📌 待复习</button>';
  h += '<button class="btn btn-sm" style="background:' + (tab === 'history' ? 'var(--accent)' : 'var(--bg3)') + ';color:' + (tab === 'history' ? '#0f172a' : 'var(--text)') + '" onclick="renderErrors(\'history\')">📋 已消除</button>';
  h += '</div></div>';

  var list = [];
  for (var i = 0; i < STATE.errors.length; i++) {
    if (tab === 'active' && !STATE.errors[i].resolved) list.push({ err: STATE.errors[i], idx: i });
    else if (tab === 'history' && STATE.errors[i].resolved) list.push({ err: STATE.errors[i], idx: i });
  }

  if (list.length === 0) {
    h += '<div class="card" style="text-align:center;padding:50px">';
    h += '<p style="font-size:18px;color:var(--text2)">' + (tab === 'active' ? '🎉 所有错题已消除！' : '暂无已消除的错题') + '</p>';
    h += '</div>';
  } else {
    var groups = {};
    for (var i = 0; i < list.length; i++) {
      var sj = list[i].err.subj;
      if (!groups[sj]) groups[sj] = [];
      groups[sj].push(list[i]);
    }
    for (var sj in groups) {
      h += '<div class="card"><h3>' + sj + '（' + groups[sj].length + '题）</h3>';
      for (var j = 0; j < groups[sj].length; j++) {
        var it = groups[sj][j];
        var e = it.err;
        h += '<div class="err-item' + (e.resolved ? ' resolved' : '') + '">';
        h += '<div style="font-size:12px;color:var(--text3)">Day ' + e.day + ' · ' + e.topic + '</div>';
        h += '<div style="font-size:15px;font-weight:500;margin:6px 0">📝 ' + e.q + '</div>';
        h += '<div style="font-size:14px">你的：<span style="color:var(--red)">' + e.userAns + '</span> → 正确：<b style="color:var(--green)">' + e.correctAns + '</b></div>';
        h += '<div style="font-size:13px;color:var(--text2);margin-top:6px;line-height:1.8">💡 ' + e.explanation + '</div>';
        h += '<div style="font-size:13px;color:var(--orange);margin-top:4px">🔍 ' + (e.reason || '混淆概念或忽略条件') + '</div>';

        if (!e.resolved) {
          h += '<div id="rt-' + it.idx + '" style="margin-top:8px"></div>';
          h += '<button class="btn btn-sm btn-primary" onclick="startRetest(' + it.idx + ')" style="margin-top:10px">🔄 同类题重测</button>';
        } else {
          h += '<div style="margin-top:8px;font-size:12px;color:var(--green)">✅ 已消除</div>';
          h += '<button class="btn btn-sm" style="background:var(--bg3);color:var(--text);margin-top:6px" onclick="restoreError(' + it.idx + ')">↩ 转回错题本</button>';
        }
        h += '</div>';
      }
      h += '</div>';
    }
  }

  $('page-errors').innerHTML = h;
}

// Similar questions pool for retest
var SIMILAR_QUESTIONS = {
  '字音': [{ q: '"勉强"中"强"的读音是：', opts: ['A. qiáng', 'B. qiǎng', 'C. jiàng', 'D. qiāng'], ans: 1, exp: '勉强读qiǎng，强迫也读qiǎng。' }],
  '字形': [{ q: '书写完全正确的是：', opts: ['A. 一愁莫展', 'B. 再接再厉', 'C. 迫不急待', 'D. 穿流不息'], ans: 1, exp: 'A一筹莫展 B再接再厉（正确） C迫不及待 D川流不息' }],
  '病句': [{ q: '下列没有语病的是：', opts: ['A. 通过努力，使成绩提高了', 'B. 春天公园盛开着花', 'C. 他大约30岁左右', 'D. 春天的公园盛开着各种花'], ans: 3, exp: 'A缺主语（删"通过"或"使"）B动宾不搭配 C"大约"与"左右"重复' }],
  '时态': [{ q: 'She ___ here since 2020.', opts: ['A. is', 'B. was', 'C. has been', 'D. will be'], ans: 2, exp: 'since + 时间点 → 现在完成时。' }],
  '计算': [{ q: '0.75 + 1/4 =', opts: ['A. 0.5', 'B. 1.0', 'C. 1.25', 'D. 0.75'], ans: 1, exp: '0.75 + 0.25 = 1.0' }],
  '_default': [{ q: '请回到原知识点页面重新学习。你认为：', opts: ['A. 已完全理解', 'B. 还需要复习', 'C. 跳过此题', 'D. 不确定'], ans: 0, exp: '建议回到知识点页面重新学习后再次测试。' }]
};

function findSimilarQ(topic) {
  for (var k in SIMILAR_QUESTIONS) {
    if (topic && (topic.indexOf(k) >= 0 || k.indexOf(topic) >= 0)) {
      return SIMILAR_QUESTIONS[k];
    }
  }
  return SIMILAR_QUESTIONS['_default'];
}

function startRetest(idx) {
  var e = STATE.errors[idx];
  var qs = findSimilarQ(e.topic || '');
  var q = qs[Math.floor(Math.random() * qs.length)];
  var lbls = ['A', 'B', 'C', 'D'];

  var h = '<div style="background:rgba(56,189,248,.06);border:1px solid var(--accent);border-radius:8px;padding:14px;margin-top:8px">';
  h += '<b>🔄 同类题重测</b>';
  h += '<div class="problem-item" style="margin:10px 0;background:var(--bg)">';
  h += '<div class="p-q">' + q.q + '</div>';
  h += '<div class="p-opts">';
  for (var o = 0; o < q.opts.length; o++) {
    h += '<label><input type="radio" name="rt-' + idx + '" value="' + o + '"> ' + q.opts[o] + '</label>';
  }
  h += '</div></div>';
  h += '<button class="btn btn-sm btn-primary" onclick="submitRetest(' + idx + ')">📝 提交</button>';
  h += '<div id="rt-r-' + idx + '" style="margin-top:8px"></div></div>';

  $('rt-' + idx).innerHTML = h;
}

function submitRetest(idx) {
  var e = STATE.errors[idx];
  var qs = findSimilarQ(e.topic || '');
  var q = qs[0]; // Use the first (most relevant) question
  var radios = document.getElementsByName('rt-' + idx);
  var sel = -1;
  for (var r = 0; r < radios.length; r++) {
    if (radios[r].checked) sel = parseInt(radios[r].value);
  }
  var isC = (sel === q.ans);
  var rd = $('rt-r-' + idx);
  var lbls = ['A', 'B', 'C', 'D'];

  if (isC) {
    STATE.errors[idx].resolved = true;
    saveState();
    rd.innerHTML = '<div style="color:var(--green);font-weight:700;padding:8px">✅ 答对了！错题已消除。</div>';
  } else {
    rd.innerHTML = '<div style="color:var(--red);font-weight:700;padding:8px">❌ 未通过。正确答案：' + lbls[q.ans] + '。<br>💡 ' + q.exp + '</div>';
  }
  setTimeout(function() { renderErrors('active'); }, 2500);
}

function restoreError(idx) {
  STATE.errors[idx].resolved = false;
  saveState();
  renderErrors('history');
}

// ═══════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════
function updateSidebar() {
  var totalDone = 0;
  var map = { chinese: 'ch', math: 'ma', english: 'en' };
  var keys = Object.keys(map);
  for (var s = 0; s < keys.length; s++) {
    for (var d = 1; d <= 12; d++) {
      if (isDayDone(keys[s], d)) totalDone++;
    }
  }
  var pct = Math.round(totalDone / 36 * 100);
  $('sb-bar').style.width = pct + '%';
  $('sb-pct').textContent = totalDone + '/36天 · ' + pct + '%';
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
function init() {
  // Wait for data files to load (they define CHINESE_DATA, MATH_DATA, ENGLISH_DATA)
  // If a data file isn't loaded yet, retry
  var retries = 0;
  function checkData() {
    if (typeof CHINESE_DATA !== 'undefined') SUBJECTS.chinese = CHINESE_DATA;
    if (typeof MATH_DATA !== 'undefined') SUBJECTS.math = MATH_DATA;
    if (typeof ENGLISH_DATA !== 'undefined') SUBJECTS.english = ENGLISH_DATA;

    var loaded = 0;
    if (SUBJECTS.chinese) loaded++;
    if (SUBJECTS.math) loaded++;
    if (SUBJECTS.english) loaded++;

    if (loaded === 3 || retries >= 10) {
      renderDash();
      updateSidebar();
    } else {
      retries++;
      setTimeout(checkData, 300);
    }
  }
  checkData();
}

// Start loading
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
