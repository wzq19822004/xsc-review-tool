<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小升初分班考 · 12天系统复习工具 v2</title>
<style>
:root{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--bg4:#475569;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--accent:#38bdf8;--green:#22c55e;--red:#ef4444;--orange:#f59e0b;--chinese:#f59e0b;--math:#3b82f6;--english:#22c55e;--sidebar-w:200px;--font-main:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;--font-mono:"SF Mono","JetBrains Mono",monospace}
*{margin:0;padding:0;box-sizing:border-box}html{font-size:16px}
body{font-family:var(--font-main);background:var(--bg);color:var(--text);line-height:1.85;display:flex;min-height:100vh}
aside{width:var(--sidebar-w);background:var(--bg2);padding:16px 0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
aside .logo{font-size:18px;font-weight:700;padding:0 16px 20px;text-align:center;border-bottom:1px solid var(--bg3);margin-bottom:12px}
aside .logo span{color:var(--accent)}aside nav{flex:1}
aside nav a{display:flex;align-items:center;gap:10px;padding:11px 16px;color:var(--text2);text-decoration:none;font-size:15px;transition:all .2s;border-left:3px solid transparent;cursor:pointer}
aside nav a:hover{color:var(--text);background:rgba(255,255,255,.05)}
aside nav a.active{color:var(--text);background:rgba(56,189,248,.1);border-left-color:var(--accent)}
aside .progress-mini{padding:16px;border-top:1px solid var(--bg3);margin-top:auto}
aside .bar{height:5px;background:var(--bg3);border-radius:3px;margin:6px 0;overflow:hidden}
aside .bar .fill{height:100%;border-radius:3px;transition:width .4s}
main{margin-left:var(--sidebar-w);flex:1;padding:24px 32px;max-width:1100px}
.page{display:none}.page.active{display:block}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.top-bar h1{font-size:24px;font-weight:700}.top-bar .meta{font-size:14px;color:var(--text2)}
.btn{padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all .15s;font-family:var(--font-main)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px}
.btn-print{background:var(--bg3);color:var(--text)}.btn-print:hover{background:var(--accent);color:#0f172a}
.btn-primary{background:var(--accent);color:#0f172a}
.day-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.day-nav button{width:42px;height:42px;border-radius:8px;border:1px solid var(--bg3);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:14px;font-weight:600;transition:all .15s;position:relative}
.day-nav button:hover{border-color:var(--accent);color:var(--text)}
.day-nav button.active{background:var(--accent);color:#0f172a;border-color:var(--accent)}
.day-nav button.done{border-color:var(--green)}
.day-nav button.done::after{content:'✓';position:absolute;top:-5px;right:-5px;font-size:11px;color:#fff;background:var(--green);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center}
.card{background:var(--bg2);border-radius:12px;padding:24px;margin-bottom:18px;border:1px solid var(--bg3)}
.card h3{font-size:18px;margin-bottom:16px}.card p,.card li{font-size:15px;line-height:2.0;margin-bottom:8px}
.section-card{background:var(--bg2);border-radius:12px;margin-bottom:16px;border:1px solid var(--bg3);overflow:hidden}
.section-card .sec-header{padding:16px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;background:rgba(255,255,255,.02)}
.section-card.open .sec-header{border-bottom:1px solid var(--bg3)}
.section-card .sec-header .left{display:flex;align-items:center;gap:12px}
.section-card .sec-header .type-tag{font-size:12px;padding:4px 10px;border-radius:5px;font-weight:700}
.section-card .sec-header .topic{font-size:17px;font-weight:700}
.section-card .sec-header .arrow{font-size:12px;color:var(--text2);transition:transform .2s}
.section-card.open .sec-header .arrow{transform:rotate(180deg)}
.section-card .sec-body{display:none;padding:20px}.section-card.open .sec-body{display:block}
.teach-block{background:var(--bg3);padding:18px 22px;border-radius:10px;margin-bottom:16px;font-size:15px;line-height:2.1}
.teach-block b,.teach-block strong{color:#fbbf24}
.formula-block{background:rgba(59,130,246,.1);border-left:4px solid var(--math);padding:16px 20px;border-radius:0 10px 10px 0;margin:14px 0;font-family:var(--font-mono);font-size:16px;line-height:2.6}
.poem-card{background:linear-gradient(135deg,rgba(245,158,11,.08),rgba(168,85,247,.08));border:1px solid rgba(245,158,11,.2);border-radius:12px;padding:24px;margin:16px 0}
.poem-card .poem-title{font-size:20px;font-weight:700;text-align:center;margin-bottom:8px;color:var(--chinese)}
.poem-card .poem-author{text-align:center;font-size:14px;color:var(--text2);margin-bottom:16px}
.poem-card .poem-text{text-align:center;font-size:20px;line-height:2.4;letter-spacing:2px;margin-bottom:16px;font-weight:500}
.poem-card .poem-notes{font-size:14px;color:var(--text2);line-height:1.9;border-top:1px dashed var(--bg4);padding-top:12px}
.problem-item{background:var(--bg3);border-radius:10px;padding:18px 20px;margin-bottom:12px;border-left:4px solid var(--bg4)}
.problem-item.diff-basic{border-left-color:var(--green)}.problem-item.diff-medium{border-left-color:var(--orange)}.problem-item.diff-hard{border-left-color:var(--red)}
.problem-item .diff-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:700;margin-right:8px}
.diff-badge.basic{background:rgba(34,197,94,.2);color:var(--green)}.diff-badge.medium{background:rgba(245,158,11,.2);color:var(--orange)}.diff-badge.hard{background:rgba(239,68,68,.2);color:var(--red)}
.problem-item .p-q{font-size:15px;font-weight:500;margin:10px 0;line-height:1.9}
.problem-item .p-options{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.problem-item .p-options label{display:flex;align-items:center;gap:6px;padding:6px 14px;background:var(--bg2);border-radius:6px;cursor:pointer;font-size:14px;border:1px solid var(--bg3)}
.problem-item .p-options label:hover{border-color:var(--accent)}
.problem-item .p-options input[type=radio]{accent-color:var(--accent);width:16px;height:16px}
.p-answer{display:none;margin-top:12px;padding:12px 16px;border-radius:8px;font-size:14px;line-height:1.8}
.p-answer.show{display:block}.p-answer.correct{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3)}.p-answer.wrong{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3)}
.quiz-section{background:var(--bg2);border-radius:12px;padding:24px;margin-top:20px;border:2px solid var(--accent)}
.quiz-section h3{font-size:18px;margin-bottom:8px;color:var(--accent)}.quiz-section .quiz-info{font-size:13px;color:var(--text2);margin-bottom:16px}
.quiz-result{display:none;margin-top:16px;padding:16px 20px;border-radius:10px;font-size:15px}.quiz-result.show{display:block}
.quiz-result.good{background:rgba(34,197,94,.12)}.quiz-result.ok{background:rgba(245,158,11,.12)}.quiz-result.bad{background:rgba(239,68,68,.12)}
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
.dash-card{background:var(--bg2);border-radius:12px;padding:22px;border:1px solid var(--bg3)}
.dash-card .dash-icon{font-size:36px;margin-bottom:8px}.dash-card .dash-num{font-size:38px;font-weight:800;margin-bottom:4px}
.dash-card .dash-label{font-size:16px;color:var(--text2)}.dash-card .dash-sub{font-size:13px;color:var(--text3);margin-top:4px}
.dash-card .dash-bar{margin-top:14px;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.dash-card .dash-bar .dash-fill{height:100%;border-radius:4px;transition:width .5s}
.dash-topic-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.topic-chip{font-size:12px;padding:3px 10px;border-radius:12px;background:var(--bg3)}
.topic-chip.done{background:rgba(34,197,94,.2);color:var(--green)}.topic-chip.current{background:rgba(56,189,248,.2);color:var(--accent)}
.check-area{background:var(--bg2);border-radius:12px;padding:20px;border:1px solid var(--bg3);margin-top:16px}
.check-area h3{font-size:16px;margin-bottom:12px}.check-list{list-style:none}
.check-list li{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:15px;cursor:pointer}
.check-list li .cb{width:22px;height:22px;border:2px solid var(--bg3);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.check-list li.done .cb{background:var(--green);border-color:var(--green)}
.check-list li.done .cb::after{content:'✓';color:#fff;font-size:13px;font-weight:700}
@media print{aside,.top-bar,.day-nav,.check-area,.btn,.quiz-section{display:none!important}main{margin-left:0!important;padding:0!important;max-width:100%!important}body{background:#fff;color:#000;font-size:13px}.card,.section-card,.teach-block,.poem-card,.problem-item{background:#fff;border:1px solid #ccc;break-inside:avoid}.sec-body{display:block!important}.formula-block{background:#f0f4ff;border-left:3px solid #333}.poem-card{background:#fffef5}}
</style>
</head>
<body>
<aside><div class="logo">📚 <span>分班考复习 v2</span></div><nav>
<a onclick="showDash()" class="active" id="nav-dash">📊 学习总览</a>
<a onclick="switchSubj('chinese')" id="nav-ch">📖 语文</a>
<a onclick="switchSubj('math')" id="nav-ma">📐 数学</a>
<a onclick="switchSubj('english')" id="nav-en">🔤 英语</a>
<a onclick="showErrors()" id="nav-err">📝 错题本</a></nav>
<div class="progress-mini"><div class="label" style="font-size:11px;color:var(--text3)">总进度</div><div class="bar"><div class="fill" id="mp-bar" style="width:0%;background:var(--accent)"></div></div><div class="label" id="mp-pct" style="font-size:11px;color:var(--text3);text-align:right">0/36天</div></div></aside>
<main>
<div class="page active" id="page-dash"></div><div class="page" id="page-ch"></div><div class="page" id="page-ma"></div><div class="page" id="page-en"></div><div class="page" id="page-err"></div>
</main>
<script>
// ══════════ STATE ══════════
var CH={},MA={},EN={},curSubj='chinese',curDay=0;
var STATE={done:{},scores:{},errors:[],checks:{},quizResults:{}};
try{var s=JSON.parse(localStorage.getItem('fbk_v2')||'{}');STATE.done=s.done||{};STATE.scores=s.scores||{};STATE.errors=s.errors||[];STATE.checks=s.checks||{};STATE.quizResults=s.quizResults||{}}catch(e){}
function save(){localStorage.setItem('fbk_v2',JSON.stringify(STATE));updateSidebar()}
function $(id){return document.getElementById(id)}
function isDone(s,d){return!!STATE.done[(s.length<=2?s:s.charAt(0))+'-'+d]}
function getSc(s,d){var k=(s.length<=2?s:s.charAt(0))+'-'+d;return STATE.scores[k]||STATE.quizResults[k]?(STATE.scores[k]||STATE.quizResults[k].score):null}
function getCourse(s){return s==='chinese'?CH:(s==='math'?MA:EN)}

// ══════════ CHINESE DATA ══════════
CH={name:'语文',icon:'📖',color:'#f59e0b',short:'ch',days:[
{day:1,title:'基础入门',topics:'字音·《观沧海》·《论语》·概括',sections:[
{type:'基础运用',topic:'字音',tagColor:'#f59e0b',content:'<p><b>一、多音字辨析</b> — 据义定音</p><p><b>常考多音字表：</b></p><table style="width:100%;border-collapse:collapse;margin:8px 0;font-size:14px"><tr style="background:var(--bg4)"><th>字</th><th>读音</th><th>例词</th></tr><tr><td>差</td><td>chā/chà/chāi/cī</td><td>差别/差不多/出差/参差</td></tr><tr><td>和</td><td>hé/hè/huó/huò</td><td>和平/附和/和面/和稀泥</td></tr><tr><td>强</td><td>qiáng/qiǎng/jiàng</td><td>强大/勉强/倔强</td></tr><tr><td>载</td><td>zǎi/zài</td><td>记载/装载</td></tr><tr><td>着</td><td>zháo/zhuó/zhe</td><td>着急/穿着/看着</td></tr></table><p><b>二、易读错字：</b>氛fēn(非fèn) | 处chǔ | 即jí | 档dàng | 潜qián</p>',problems:[{diff:'basic',q:'下列加点字读音完全正确的一项是：',opts:['A. 氛(fèn)围','B. 载(zǎi)重','C. 勉强(qiǎng)','D. 差(chā)不多'],ans:2,exp:'A读fēn，B读zài，D读chà。C正确。'},{diff:'basic',q:'"处理"中"处"的读音是：',opts:['A. chù','B. chǔ','C. chū','D. chú'],ans:1,exp:'动词读chǔ，名词读chù。'},{diff:'medium',q:'读音完全相同的一组：',opts:['A. 和面 和平','B. 记载 载重','C. 强迫 勉强','D. 穿着 着急'],ans:2,exp:'C都读qiǎng。'},{diff:'medium',q:'注音全部正确：',opts:['A. 档(dǎng)案','B. 档(dàng)案、潜(qián)力','C. 档(dǎng)案、潜(qián)力','D. 档(dàng)案、潜(qiǎn)力'],ans:1,exp:'档读dàng，潜读qián。'},{diff:'hard',q:'读音有误的一项：',opts:['A. 勉强(qiǎng)','B. 穿着(zhuó)','C. 差(chā)别','D. 气氛(fèn)'],ans:3,exp:'D读fēn，非fèn。'},{diff:'hard',q:'"和诗"中"和"与哪项读音相同？',opts:['A. 和平','B. 附和','C. 和面','D. 暖和'],ans:1,exp:'"和诗"读hè，B也读hè。'}]},
{type:'诗词鉴赏',topic:'《观沧海》',tagColor:'#a78bfa',content:'<div class="poem-card"><div class="poem-title">观沧海</div><div class="poem-author">【东汉】曹操</div><div class="poem-text">东临碣石，以观沧海。<br>水何澹澹，山岛竦峙。<br>树木丛生，百草丰茂。<br>秋风萧瑟，洪波涌起。<br>日月之行，若出其中；<br>星汉灿烂，若出其里。<br>幸甚至哉，歌以咏志。</div><div class="poem-notes"><b>【注解】</b>临=登上 | 澹澹(dàn)=水波摇动 | 竦峙(sǒngzhì)=耸立 | 星汉=银河<br><b>【背景】</b>公元207年曹操北征乌桓胜利后登碣石山所作，借大海壮阔抒发统一天下的雄心。<br><b>【手法】</b>借景抒情、虚实结合、动静相生<br><b>【名句】</b>"日月之行，若出其中；星汉灿烂，若出其里"——虚写，展现包容宇宙的博大胸怀。</div></div>',problems:[{diff:'basic',q:'作者是？',opts:['A. 李白','B. 杜甫','C. 曹操','D. 王湾'],ans:2,exp:'曹操，北征乌桓胜利后所作。'},{diff:'basic',q:'"澹澹"的意思是：',opts:['A. 清澈','B. 水波摇动','C. 平静','D. 流动'],ans:1,exp:'水波摇动的样子。'},{diff:'medium',q:'虚写的是：',opts:['A. 东临碣石','B. 树木丛生','C. 日月之行若出其中','D. 秋风萧瑟'],ans:2,exp:'C为想象之景，其他为实写。'},{diff:'medium',q:'理解错误的是：',opts:['A. 以"观"字统领','B. 动静结合','C. 表达归隐愿望','D. 展现博大胸怀'],ans:2,exp:'表达的是统一天下的雄心。'},{diff:'hard',q:'"日月之行若出其中"修辞及效果：',opts:['A. 比喻','B. 拟人','C. 夸张想象展现壮阔','D. 对比'],ans:2,exp:'夸张和想象，展现大海壮阔气势。'}]},
{type:'文言文',topic:'《论语》十二章（一）',tagColor:'#fb923c',content:'<p>①"学而时习之"（说=悦）②"三省吾身"（省xǐng）③"温故而知新"④"学而不思则罔，思而不学则殆"（罔wǎng/殆dài）⑤"贤哉回也"——安贫乐道</p>',problems:[{diff:'basic',q:'"说"的意思是：',opts:['A. 说话','B. 通"悦"，愉快','C. 解释','D. 据说'],ans:1,exp:'通假字，说=悦。'},{diff:'basic',q:'"三省"中"三"指：',opts:['A. 三次','B. 多次','C. 三件事','D. 三天'],ans:1,exp:'虚数，多次。'},{diff:'medium',q:'翻译"学而不思则罔"：',opts:['A. 不重要','B. 只学不思会迷惑','C. 学习更重要','D. 思考更重要'],ans:1,exp:'罔=迷惑。学思结合。'},{diff:'medium',q:'"而"表转折的是：',opts:['A. 学而时习之','B. 温故而知新','C. 人不知而不愠','D. 择善而从'],ans:2,exp:'C的"而"表转折(但是)。'}]},
{type:'阅读理解',topic:'概括文章主要内容',tagColor:'#34d399',content:'<p><b>📖 阅读短文：</b></p><div style="background:var(--bg);border-left:3px solid var(--accent);padding:14px 18px;margin:10px 0;font-size:15px;line-height:2.0"><b>《外婆的桂花糕》</b><br>每到秋天，外婆总会做桂花糕。她清晨去摇桂花，金黄花瓣纷纷落下。外婆把桂花洗净晾干，和糯米粉、白糖层层铺进蒸笼。满屋飘香时，我总忍不住跑去厨房问"好了没有"。外婆笑说："小馋猫，好东西要等。"去年外婆走了。今年妈妈试着做，味道很像，可总觉得少了点什么——大概是外婆那声"小馋猫"吧。</div><p><b>四种方法演示：</b>①要素归纳法→外婆做桂花糕，表达对外婆的思念 ②段意合并法→场景+过程+情感 ③找中心句→首句点明回忆对象，末句点明情感 ④题目扩展法→通过写桂花糕往事表达思念</p>',problems:[{diff:'basic',q:'用要素法概括：',opts:['A. 桂花糕好吃','B. 通过桂花糕回忆表达思念','C. 秋天到了','D. 妈妈做桂花糕'],ans:1,exp:'事件+情感，概括完整。'},{diff:'basic',q:'最常用的概括法：',opts:['A. 抄原文','B. 要素归纳法','C. 看标题','D. 读最后一段'],ans:1,exp:'要素法最有效。'},{diff:'medium',q:'"一次次跑厨房"概括时：',opts:['A. 详细写','B. 概括为"急切等待"','C. 忽略','D. 单独成段'],ans:1,exp:'细节提炼，保留情感。'},{diff:'medium',q:'概括为"好吃"的问题：',opts:['A. 没问题','B. 缺少情感','C. 字数多','D. 没提桂花'],ans:1,exp:'缺少对外婆的思念。'},{diff:'hard',q:'30字内最佳概括：',opts:['A. 做桂花糕过程','B. 借桂花糕回忆外婆表达思念','C. 秋天故事','D. 学做桂花糕'],ans:1,exp:'事件+情感，15字简洁完整。'}]}],

{type:'诗词鉴赏',topic:'《闻王昌龄左迁龙标遥有此寄》',tagColor:'#a78bfa',content:'<div class="poem-card"><div class="poem-title">闻王昌龄左迁龙标遥有此寄</div><div class="poem-author">【唐】李白</div><div class="poem-text">杨花落尽子规啼，<br>闻道龙标过五溪。<br>我寄愁心与明月，<br>随君直到夜郎西。</div><div class="poem-notes"><b>注解：</b>左迁=贬官 | 子规=杜鹃 | 夜郎=古国名<br><b>名句：</b>"我寄愁心与明月，随君直到夜郎西"——拟人，将愁心托付明月。</div></div>',problems:[{diff:'basic',q:'"左迁"意思是：',opts:['A.升官','B.贬官','C.调任','D.退休'],ans:1,exp:'古代以右为尊，左迁即贬官。'},{diff:'basic',q:'作者是：',opts:['A.杜甫','B.李白','C.王维','D.王昌龄'],ans:1,exp:'李白写给被贬的好友王昌龄。'},{diff:'medium',q:'"杨花落尽子规啼"的作用：',opts:['A.写春景','B.渲染离别哀愁','C.说明时间','D.表达喜悦'],ans:1,exp:'杨花飘零+子规哀啼渲染离愁。'}]},
{type:'文言文',topic:'《论语》十二章（二）',tagColor:'#fb923c',content:'<p>⑦"知之者不如好之者"——兴趣 ⑧"饭疏食饮水"——安贫乐道 ⑨"三人行必有我师"——虚心 ⑩"逝者如斯夫"——惜时 ⑪"匹夫不可夺志"——坚守 ⑫"博学笃志"——方法</p>',problems:[{diff:'basic',q:'"三人行"中"焉"：',opts:['A.哪里','B.于之(在其中)','C.语气词','D.他们'],ans:1,exp:'兼词=于之。'},{diff:'basic',q:'"逝者"指：',opts:['A.死人','B.流逝的时光','C.朋友','D.错误'],ans:1,exp:'孔子感叹时光如流水。'},{diff:'medium',q:'告诉我们要虚心学习的是：',opts:['A.温故知新','B.三人行必有我师','C.逝者如斯','D.匹夫不可夺志'],ans:1,exp:'几个人中必有可学习的人。'}]},
{type:'阅读理解',topic:'标题的含义和作用',tagColor:'#34d399',content:'<p><b>📖 阅读《走一步，再走一步》节选分析标题：</b></p><div style="background:var(--bg);border-left:3px solid var(--accent);padding:14px 18px;margin:10px 0;font-size:15px;line-height:2.0">父亲找到困在悬崖上的我，说："不要想有多远，只想着走一小步。"我一步步爬下悬崖。此后每当遇到困难，我都会想起——走一步，再走一步。</div><p><b>表层：</b>爬悬崖时一步步走下来 <b>深层：</b>分解困难逐步克服 <b>作用：</b>线索+点明主旨</p>',problems:[{diff:'basic',q:'表层含义：',opts:['A.人生哲理','B.一步步走下来的动作','C.走路方法','D.爬山技巧'],ans:1,exp:'表层指具体动作，深层才是哲理。'},{diff:'basic',q:'分析标题从哪两层？',opts:['A.开头结尾','B.表层和深层','C.正面反面','D.过去现在'],ans:1,exp:'标题分析标准方法。'},{diff:'medium',q:'标题作用：',opts:['A.概括内容','B.线索+点明主旨','C.无作用','D.吸引读者'],ans:1,exp:'贯穿全文+揭示人生道理。'},{diff:'medium',q:'只写表层有什么不足？',opts:['A.没问题','B.缺少深层含义和作用','C.字数少','D.语法错'],ans:1,exp:'必须覆盖表层+深层+作用。'}]}],

{type:'诗词鉴赏',topic:'《天净沙·秋思》',tagColor:'#a78bfa',content:'<div class="poem-card"><div class="poem-title">天净沙·秋思</div><div class="poem-author">【元】马致远</div><div class="poem-text">枯藤老树昏鸦，小桥流水人家，古道西风瘦马。<br>夕阳西下，断肠人在天涯。</div><div class="poem-notes"><b>特色：</b>九个意象叠加(列锦)，前三句全用名词无一动词。<b>以乐景写哀情</b>——温馨"人家"反衬游子孤寂。</div></div>',problems:[{diff:'basic',q:'作者：',opts:['A.李白','B.马致远','C.杜甫','D.王湾'],ans:1,exp:'元代散曲家，秋思之祖。'},{diff:'basic',q:'直接表情：',opts:['A.枯藤老树','B.小桥流水','C.夕阳西下','D.断肠人在天涯'],ans:3,exp:'前三句写景，末句点明情感。'},{diff:'medium',q:'写法特点：',opts:['A.全是动词','B.列锦手法九意象叠加','C.全是拟人','D.全是夸张'],ans:1,exp:'三句18字9个名词意象，无一动词。'},{diff:'hard',q:'"小桥流水人家"作用：',opts:['A.写景','B.以乐景衬哀情','C.写家','D.无作用'],ans:1,exp:'温馨反衬游子无家可归的凄凉。'}]},
{type:'文言文',topic:'《咏雪》',tagColor:'#fb923c',content:'<p>谢安问"白雪纷纷何所似"，谢朗说"撒盐空中差可拟"，谢道韫说"未若柳絮因风起"。<b>谢道韫的比喻更优</b>——柳絮轻盈飘舞更像雪花，且带来春的意境。出自《世说新语》。</p>',problems:[{diff:'basic',q:'出自：',opts:['A.论语','B.世说新语','C.史记','D.吕氏春秋'],ans:1,exp:'南朝刘义庆编。'},{diff:'medium',q:'谢道韫比喻更好的原因：',opts:['A.柳絮更白','B.轻盈飘舞更像雪花有诗意','C.盐太重','D.因为是女孩'],ans:1,exp:'姿态相似+春天意境。'},{diff:'medium',q:'"差"的意思：',opts:['A.差别','B.大体/差不多','C.很差','D.出差'],ans:1,exp:'差可拟=大体上可以比拟。'}]},

// ══════════ ERROR BOOK ══════════
function showErrors(){['dash','ch','ma','en','err'].forEach(function(p){$(('page-'+p)).classList.remove('active')});$(('page-err')).classList.add('active');['dash','ch','ma','en','err'].forEach(function(p){var n=$('nav-'+p);if(n)n.classList.remove('active')});$('nav-err').classList.add('active');rErrs()}
function rErrs(t){t=t||'active';var h='<div class="top-bar"><h1>📝 错题本</h1><div style="display:flex;gap:8px"><button class="btn btn-sm" style="background:'+(t==='active'?'var(--accent)':'var(--bg3)')+';color:'+(t==='active'?'#0f172a':'var(--text)')+'" onclick="rErrs(\'active\')">📌 待复习</button><button class="btn btn-sm" style="background:'+(t==='history'?'var(--accent)':'var(--bg3)')+';color:'+(t==='history'?'#0f172a':'var(--text)')+'" onclick="rErrs(\'history\')">📋 已消除</button></div></div>';var aE=[],hE=[];for(var i=0;i<STATE.errors.length;i++){if(STATE.errors[i].resolved)hE.push(STATE.errors[i]);else aE.push(STATE.errors[i])}var list=t==='active'?aE:hE;if(list.length===0){h+='<div class="card" style="text-align:center;padding:40px"><p style="font-size:18px;color:var(--text2)">'+(t==='active'?'🎉 所有错题已消除！':'暂无已消除的错题')+'</p></div>'}else{var g={};for(var i=0;i<list.length;i++){var e=list[i];if(!g[e.subj])g[e.subj]=[];g[e.subj].push({err:e,idx:STATE.errors.indexOf(e)})}for(var sj in g){h+='<div class="card"><h3>'+sj+'（'+g[sj].length+'题）</h3>';for(var j=0;j<g[sj].length;j++){var it=g[sj][j],e=it.err;h+='<div class="error-item" style="border-left-color:'+(e.resolved?'var(--green)':'var(--red)')+'"><div class="err-meta">Day '+e.day+' · '+e.topic+'</div><div class="err-q">📝 '+e.q+'</div><div>你的：<span style="color:var(--red)">'+e.userAns+'</span> → 正确：<b style="color:var(--green)">'+e.correctAns+'</b></div><div style="font-size:13px;color:var(--text2);margin-top:4px;line-height:1.8">💡 '+e.explanation+'</div><div style="font-size:13px;color:var(--orange);margin-top:4px">🔍 '+(e.reason||'混淆概念或忽略条件')+'</div>';if(!e.resolved){h+='<div id="rt-'+it.idx+'" style="margin-top:8px"></div><button class="btn btn-sm btn-primary" onclick="startRetest('+it.idx+')" style="margin-top:8px">🔄 同类题重测</button>'}else{h+='<div style="margin-top:8px;font-size:12px;color:var(--green)">✅ 已消除</div><button class="btn btn-sm" style="background:var(--bg3);color:var(--text)" onclick="rstErr('+it.idx+')">↩ 转回错题本</button>'}h+='</div>'}h+='</div>'}}$(('page-err')).innerHTML=h}
var SQS={字音:[{q:'"勉强"中"强"的读音：',opts:['A. qiáng','B. qiǎng','C. jiàng','D. qiāng'],ans:1,exp:'勉强读qiǎng。'}],字形:[{q:'书写正确的是：',opts:['A.一愁莫展','B.再接再厉','C.迫不急待','D.穿流不息'],ans:1,exp:'再接再厉正确。'}],病句:[{q:'无语病的是：',opts:['A.通过努力使成绩提高了','B.春天公园盛开花','C.他大约30岁左右','D.春天的公园盛开着各种花'],ans:3,exp:'A缺主语B动宾不搭C重复。'}],时态:[{q:'She ___ since 2020.',opts:['is','was','has been','will be'],ans:2,exp:'since→完成时。'}],计算:[{q:'0.75+1/4=',opts:['0.5','1.0','1.25','0.75'],ans:1,exp:'0.25+0.75=1.0'}],default:[{q:'请回到原知识点学习后选择：',opts:['A. 已理解','B. 还需要复习','C. 跳过','D. 不确定'],ans:0,exp:'建议回到知识点页面重新学习。'}]};
function getSQs(t){for(var k in SQS)if(t&&(t.indexOf(k)>=0||k.indexOf(t)>=0))return SQS[k];return SQS.default}
function startRetest(idx){var e=STATE.errors[idx],qs=getSQs(e.topic||''),q=qs[0],h='<div style="background:rgba(56,189,248,.08);border:1px solid var(--accent);border-radius:8px;padding:12px;margin-top:8px"><b>🔄 同类题重测</b><div class="problem-item" style="margin:8px 0;background:var(--bg)"><div class="p-q">'+q.q+'</div><div class="p-options">';for(var o=0;o<q.opts.length;o++)h+='<label><input type="radio" name="rt-'+idx+'" value="'+o+'"> '+q.opts[o]+'</label>';h+='</div></div><button class="btn btn-sm btn-primary" onclick="subRt('+idx+')">📝 提交</button><div id="rt-r-'+idx+'" style="margin-top:8px"></div></div>';document.getElementById('rt-'+idx).innerHTML=h}
function subRt(idx){var q=getSQs(STATE.errors[idx].topic||'')[0],rds=document.getElementsByName('rt-'+idx),sel=-1;for(var r=0;r<rds.length;r++)if(rds[r].checked)sel=parseInt(rds[r].value);var isC=(sel===q.ans),rd=document.getElementById('rt-r-'+idx);if(isC){STATE.errors[idx].resolved=true;save();rd.innerHTML='<div style="color:var(--green);font-weight:700;padding:8px">✅ 答对了！错题已消除。</div>'}else{var L=['A','B','C','D'];rd.innerHTML='<div style="color:var(--red);font-weight:700;padding:8px">❌ 未通过。正确答案：'+L[q.ans]+'。<br>💡 '+q.exp+'</div>'}setTimeout(function(){rErrs('active')},2000)}
function rstErr(idx){STATE.errors[idx].resolved=false;save();rErrs('history')}
function updateSidebar(){var td=0,m={chinese:'ch',math:'ma',english:'en'};['chinese','math','english'].forEach(function(s){for(var d=1;d<=12;d++)if(isDone(m[s],d))td++});var pct=Math.round(td/36*100);$('mp-bar').style.width=pct+'%';$('mp-pct').textContent=td+'/36天 · '+pct+'%'}
(function(){renderDash();updateSidebar()})();
</script>
</body>
</html>
